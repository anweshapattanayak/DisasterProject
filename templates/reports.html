<h2>Reports</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>User ID</th>
        <th>Resource ID</th>
        <th>Quantity</th>
        <th>Priority</th>
        <th>Status</th>
    </tr>

    {% for r in requests %}
    <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.user_id }}</td>
        <td>{{ r.resource_id }}</td>
        <td>{{ r.quantity }}</td>
        <td>{{ r.priority }}</td>
        <td>{{ r.status }}</td>
    </tr>
    {% endfor %}
</table>

<br>
