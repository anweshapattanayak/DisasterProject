<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Resource - NexAid</title>

<style>
body {
    height: 100vh;
    background: url('/static/images/background.jpg') no-repeat center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
}

.form-container {
    width: 400px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius: 40px;
    border: 3px solid rgba(255,255,255,0.3);
    padding: 30px;
    text-align: center;
}

h2 { color: white; }

.form-group {
    margin: 15px 0;
    border-bottom: 2px solid white;
}

input, select {
    width: 100%;
    height: 40px;
    background: transparent;
    border: none;
    color: rgb(12, 10, 10);
    outline: none;
}

select option {
    color: black;
}

.btn {
    width: 100%;
    height: 45px;
    border-radius: 30px;
    border: none;
    margin-top: 20px;
    cursor: pointer;
    background: #28a745;
    color: white;
    font-weight: bold;
}

.success {
    color: lightgreen;
    margin-bottom: 15px;
    font-weight: bold;
}

.error {
    color: red;
    margin-bottom: 15px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="form-container">
    <h2>Request Resource</h2>

    {% if success %}
        <div class="success">✅ Resource requested successfully!</div>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form action="/submit-request" method="post">

        <div class="form-group">
            <select name="resource_id" required>
                <option value="">Select Resource</option>
                <option value="1">🍱 Food</option>
                <option value="2">💧 Water</option>
                <option value="3">💊 Medicine</option>
            </select>
        </div>

        <div class="form-group">
            <input type="number" name="quantity" placeholder="Enter Quantity" min="1" required 
style="color: black !important; -webkit-text-fill-color: black;">
        </div>

        <div class="form-group">
            <select name="priority" required>
                <option value="">Select Priority</option>
                <option value="low">🟢 Low</option>
                <option value="medium">⚡ Medium</option>
                <option value="high">🔥 High</option>
            </select>
        </div>

        <button class="btn">Send Request</button>
    </form>

    <!-- ✅ ADDED -->
    <div style="margin-top:15px;">
        <a href="/reports-page"><button class="btn">View My Requests</button></a>
    </div>

</div>

<div style="position:absolute; top:20px; right:20px;">
    <a href="/logout">
        <button style="padding:8px 15px; border:none; border-radius:20px; background:red; color:white; cursor:pointer;">
            Logout
        </button>
    </a>
</div>

</body>
</html>
