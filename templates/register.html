<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - NexAid</title>
    <style>
        /* Exact copy of your login styling to maintain consistency */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            width: 100%;
            height: 100vh;
            background: url('/static/images/background.jpg') no-repeat;
            background-position: center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            width: 400px;
            height: 560px; /* Slightly taller to fit 3 fields + button */
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        h2 {
            color: #fff;
            text-transform: uppercase;
            padding: 10px 0;
            font-size: 2em;
        }
        .form-group {
            position: relative;
            width: 330px;
            border-bottom: 3px solid #fff;
            margin: 20px 0;
        }
        .form-group input {
            width: 100%;
            height: 50px;
            background: transparent;
            border: none;
            font-size: 1.2em;
            color: #fff;
            padding: 0 30px 0 10px;
            outline: none;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
        }
        .btn {
            width: 330px;
            height: 50px;
            border-radius: 40px;
            border: none;
            text-transform: uppercase;
            font-weight: 600;
            margin: 20px 0 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: rgba(0,0,0,0.3);
            color: #fff;
        }
        p {
            text-align: center;
            color: #fff;
            padding: 10px 0;
        }
        p > a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        p > a:hover {
            text-decoration: underline;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Register</h2>
        
        <form action="/register" method="POST">
            
            <div class="form-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <input type="email" name="email" placeholder="Enter Email" required>
            </div>
            
            <div class="form-group">
                <input type="password" name="password" placeholder="Create Password" required>
            </div>
            
            <button type="submit" class="btn">Sign Up</button>
            
            <p>Already a member? <a href="/login-page">Login here</a></p>
        </form>
    </div>
</body>
</html>
