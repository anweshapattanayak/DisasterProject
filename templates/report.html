<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Disaster - NexAid</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body {
    width:100%;
    height:100vh;
    background:url('/static/images/background.jpg') no-repeat center;
    background-size:cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.form-container {
    width:400px;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    border-radius:40px;
    border:3px solid rgba(255,255,255,0.3);
    padding:30px;
    text-align:center;
}

h2 {color:#fff;margin-bottom:20px;}

.form-group {
    width:100%;
    border-bottom:2px solid #fff;
    margin:15px 0;
}

.form-group input,
.form-group select {
    width:100%;
    height:40px;
    background:transparent;
    border:none;
    color:#0e0d0d;
    outline:none;
}

.btn {
    width:100%;
    height:45px;
    border-radius:30px;
    border:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="form-container">
<h2>Report Disaster</h2>

<form action="/submit-report" method="post">

<div class="form-group">
<input type="text" name="location" placeholder="Location" required 
style="color: black !important; -webkit-text-fill-color: black;">
</div>

<div class="form-group">
<select name="disaster_type" required>
<option value="">Select Type</option>
<option value="Flood">Flood</option>
<option value="Earthquake">Earthquake</option>
<option value="Cyclone">Cyclone</option>
</select>
</div>

<div class="form-group">
<input type="text" name="severity" placeholder="Severity" required 
style="color: black !important; -webkit-text-fill-color: black;">
</div>

<button class="btn">Submit Report</button>

{% if success %}
    <div class="success">✅ Action completed successfully!</div>
{% endif %}
</form>

<!-- ✅ ADDED OPTIONS (NO UI CHANGE) -->
<div style="margin-top:15px;">
    <a href="/resource-page"><button class="btn">Request Resource</button></a>
    <a href="/reports-page"><button class="btn">View My Requests</button></a>
</div>

</div>

<div style="position:absolute; top:20px; right:20px;">
    <a href="/logout">
        <button style="padding:8px 15px; border:none; border-radius:20px; background:red; color:white; cursor:pointer;">
            Logout
        </button>
    </a>
</div>

</body>
</html>
