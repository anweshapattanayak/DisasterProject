<!DOCTYPE html>
<html>
<head>
    <title>Allocation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<div class="page">

    <div class="top-header">
        <h1>⚙️ Allocation</h1>
    </div>

    <div class="wrapper">

        <!-- Side Menu -->
        <div class="side-panel">
            
            <a href="/allocation" class="active">⚙️ Allocation</a>
            <a href="/reports-page">📊 Reports</a>
        </div>

        <!-- Allocation Card -->
        <div class="main-card">
            <h2>🚨 Allocate Resources</h2>

            <<form action="/allocate" method="post">

    <input type="number" name="resource_id" placeholder="Resource ID" required>

    <input type="number" name="quantity" placeholder="Quantity" required>

    <select name="priority" required>
        <option value="">Select Priority</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

    <button type="submit">Allocate</button>
    

</form>


<div class="form-container">
    <!-- your existing allocation form -->
</div>
            <!-- SUCCESS MESSAGE -->
            {% if message %}
                <p style="color: green; margin-top:10px;">{{ message }}</p>
            {% endif %}

            <!-- ERROR MESSAGE -->
            {% if error %}
                <p style="color: red; margin-top:10px;">{{ error }}</p>
            {% endif %}

        </div>

    </div>

</div>
<a href="/logout" class="logout-btn">Logout</a>
</body>
</html>
