<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Volunteer Hub - NexAid</title>

<style>
body {font-family:Arial;background:#f4f4f4;}

.mgmt-wrapper {
    width:90%;
    margin:auto;
}

.mgmt-card {
    background:white;
    padding:20px;
    margin:20px 0;
}

.inline-form {
    display:flex;
    gap:10px;
}

.inline-form input, select {
    padding:10px;
}
</style>
</head>

<body>

<div class="mgmt-wrapper">

<div class="mgmt-card">
<h3>Register New Volunteer</h3>

<form action="/add-volunteer" method="POST" class="inline-form">

<input type="text" name="name" placeholder="Full Name" required>

<select name="skill">
<option value="medical">Medical</option>
<option value="rescue">Rescue</option>
<option value="logistics">Logistics</option>
</select>

<button>Add Volunteer</button>

</form>

</div>

</div>

</body>
</html>
